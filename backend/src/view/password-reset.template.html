<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
            margin: 0;
        }
        .card {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            padding: 32px;
        }
        h2 {
            margin: 0 0 8px;
            font-size: 18px;
            font-weight: 600;
            color: #1a1a1a;
        }
        p {
            margin: 0 0 24px;
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }
        .btn {
            display: block;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 6px;
            text-align: center;
            font-weight: 500;
            margin-bottom: 16px;
        }
        .note {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-top: 24px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Reset your password</h2>
        <p>Click the button below to set a new password for your account.</p>
        <a href="{{resetUrl}}" class="btn">Reset Password</a>
        <p class="note">This link expires in 15 minutes.<br>Didn't request this? Ignore this email.</p>
    </div>
</body>
</html>
