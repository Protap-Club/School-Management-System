<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Updated</title>
  <style>
    body {
      margin: 0;
      padding: 24px;
      background: #f5f5f5;
      color: #111111;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.5;
    }
    .card {
      max-width: 520px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 28px;
    }
    .brand {
      font-size: 13px;
      color: #666666;
      margin-bottom: 16px;
      letter-spacing: 0.01em;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 22px;
      font-weight: 650;
      color: #111111;
    }
    p {
      margin: 0 0 12px;
      color: #333333;
      font-size: 14px;
    }
    .info {
      margin: 16px 0;
      padding: 14px 16px;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      background: #fafafa;
    }
    .k {
      font-size: 12px;
      color: #666666;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .v {
      margin-top: 4px;
      font-size: 14px;
      font-weight: 600;
      color: #111111;
    }
    .meta {
      margin-top: 20px;
      font-size: 12px;
      color: #666666;
      border-top: 1px solid #efefef;
      padding-top: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">{{schoolName}}</div>
    <h1>Password updated</h1>
    <p>Hello {{name}}, your account password was changed successfully.</p>

    <div class="info">
      <div class="k">When</div>
      <div class="v">{{changedAt}}</div>
    </div>

    <div class="info">
      <div class="k">Method</div>
      <div class="v">{{reason}}</div>
    </div>

    <div class="meta">
      If this was not you, contact your administrator immediately.
    </div>
  </div>
</body>
</html>
