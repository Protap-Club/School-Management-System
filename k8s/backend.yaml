apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: IMAGE_PLACEHOLDER
        ports:
        - containerPort: 5000
        env:
          - name: MONGO_URL
            valueFrom:
              secretKeyRef:
                name: backend-secrets
                key: MONGODB_URI
        # Optional: Add resource limits for GKE efficiency
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP
