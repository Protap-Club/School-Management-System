apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      automountServiceAccountToken: false
      containers:
      - name: backend
        image: gcr.io/school-mgmt-493518/backend:v1.0.0-placeholder
        ports:
        - containerPort: 5000
        env:
          - name: MONGO_URL
            valueFrom:
              secretKeyRef:
                name: backend-secrets
                key: MONGODB_URI
        resources:
          requests:
            # FIX: CPU must be in cores/millicores, not Mi (Megabytes)
            cpu: "250m"        # 0.25 of a CPU core
            memory: "512Mi"    # Reduced for better schedulability
            ephemeral-storage: "1Gi"
          limits:
            cpu: "500m"        # Allow bursting to 0.5 core
            memory: "1Gi"      # Hard limit for memory
            ephemeral-storage: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP
