apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # FIX 1: Security Hardening - Disable automatic mounting of API tokens
      automountServiceAccountToken: false
      containers:
      - name: backend
        # FIX 2: Satisfies the "Specific Version" check (CI/CD replaces this)
        image: gcr.io/your-project/backend:v1.0.0-placeholder
        ports:
        - containerPort: 5000
        env:
          - name: MONGO_URL
            valueFrom:
              secretKeyRef:
                name: backend-secrets
                key: MONGODB_URI
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
            # FIX 3: Specify ephemeral storage request
            ephemeral-storage: "1Gi"
          limits:
            # FIX 4: Specify memory limit to prevent Node crashes
            cpu: "500m"
            memory: "512Mi"
            ephemeral-storage: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP
