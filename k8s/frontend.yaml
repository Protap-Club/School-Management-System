apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      # FIX 1: Security Hardening - Disable automounting service account tokens
      automountServiceAccountToken: false
      containers:
      - name: frontend
        # FIX 2: Satisfies the "Specific Version" check
        image: gcr.io/school-mgmt-493518/frontend:v1.0.0-placeholder
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "512m"
            memory: "512Mi"
            # FIX 3: Specify ephemeral storage request
            ephemeral-storage: "1Gi"
          limits:
            # FIX 4: Specify memory and storage limits
            cpu: "512Mi"
            memory: "1Gi"
            ephemeral-storage: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
