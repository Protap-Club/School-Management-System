apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      automountServiceAccountToken: false
      containers:
      - name: frontend
        image: gcr.io/school-mgmt-493518/frontend:v1.0.0-placeholder
        ports:
        - containerPort: 80
        resources:
          requests:
            # FIX: Use millicores (m) for CPU, not Mi
            cpu: "100m"         
            memory: "256Mi"     
            ephemeral-storage: "512Mi"
          limits:
            cpu: "200m"         
            memory: "512Mi"     
            ephemeral-storage: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
