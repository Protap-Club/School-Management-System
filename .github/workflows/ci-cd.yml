name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  GCP_PROJECT_ID: your-gcp-project-id # Replace with your GCP project ID
  GKE_CLUSTER: your-gke-cluster-name  # Replace with your GKE cluster name
  GKE_ZONE: your-gke-cluster-zone    # Replace with your GKE cluster zone (e.g., us-central1-a)
  IMAGE_REPO: gcr.io/${{ env.GCP_PROJECT_ID }}

jobs:
  build-and-scan-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # SonarQube needs full history

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: SonarQube Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectDir: .

      - name: Build Backend Docker Image (Dry Run)
        run: docker build -t backend:latest ./backend

      - name: Build Frontend Docker Image (Dry Run)
        run: docker build -t frontend:latest ./frontend

  build-push-deploy-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: build-and-scan-pr # Ensure PR checks pass before deploying
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Configure Docker to use gcloud as a credential helper'
        run: |n          gcloud auth configure-docker

      - name: Build and Push Backend Docker Image
        run: |
          docker build -t ${{ env.IMAGE_REPO }}/backend:${{ github.sha }} ./backend
          docker push ${{ env.IMAGE_REPO }}/backend:${{ github.sha }}

      - name: Build and Push Frontend Docker Image
        run: |
          docker build -t ${{ env.IMAGE_REPO }}/frontend:${{ github.sha }} ./frontend
          docker push ${{ env.IMAGE_REPO }}/frontend:${{ github.sha }}

      - name: 'Get GKE credentials'
        uses: 'google-github-actions/get-gke-credentials@v2'
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_ZONE }}

      - name: 'Deploy to GKE'
        run: |
          kubectl apply -f k8s/backend.yaml
          kubectl apply -f k8s/frontend.yaml
          kubectl set image deployment/backend backend=${{ env.IMAGE_REPO }}/backend:${{ github.sha }}
          kubectl set image deployment/frontend frontend=${{ env.IMAGE_REPO }}/frontend:${{ github.sha }}
